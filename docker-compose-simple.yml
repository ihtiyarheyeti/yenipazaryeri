version: "3.9"
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: entegrasyon_paneli
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports: ["3306:3306"]
    volumes: ["dbdata:/var/lib/mysql"]
    healthcheck: { test: ["CMD","mysqladmin","ping","-h","localhost"], interval: 10s, timeout: 5s, retries: 10 }

  redis:
    image: redis:7
    ports: ["6379:6379"]

volumes:
  dbdata:
